<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>x-clone | Code Clone Detection</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

    <style>
        :root {
            --bg1: #0f172a;
            --bg2: #020617;
            --accent1: #22c55e;
            --accent2: #6366f1;
            --accent3: #ec4899;
            --accent4: #f97316;
            --text-main: #f9fafb;
            --text-muted: #9ca3af;
            --glass: rgba(15, 23, 42, 0.55);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            font-family: system-ui;
            color: var(--text-main);
            background: radial-gradient(circle at top left, #1d2438 0, var(--bg2) 50%, #020617 100%);
            overflow-x: hidden;
        }

        .bg-layer {
            position: fixed;
            inset: -10%;
            background:
                radial-gradient(circle at 10% 0%, rgba(96, 165, 250, .4), transparent 55%),
                radial-gradient(circle at 90% 20%, rgba(244, 114, 182, .35), transparent 55%),
                radial-gradient(circle at 50% 100%, rgba(45, 212, 191, .3), transparent 55%),
                linear-gradient(135deg, #020617, #020617);
            z-index: 0;
            transition: transform .25s ease-out;
            pointer-events: none;
        }

        .bg-grid {
            position: fixed;
            inset: 0;
            background-image: linear-gradient(rgba(148, 163, 184, .08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(148, 163, 184, .06) 1px, transparent 1px);
            background-size: 40px 40px;
            opacity: .65;
            z-index: 0;
        }

        /* ---------------- NAVBAR ---------------- */
        nav {
            position: sticky;
            top: 0;
            z-index: 20;
            backdrop-filter: blur(14px);
            background: var(--glass);
            border-bottom: 1px solid rgba(148, 163, 184, 0.2);
            padding: 10px 22px;
        }

        nav .nav-inner {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 1px;
        }

        nav ul {
            display: flex;
            list-style: none;
            gap: 28px;
            font-size: 14px;
        }

        nav ul li {
            cursor: pointer;
            transition: 0.2s;
        }

        nav ul li:hover {
            color: var(--accent2);
            text-shadow: 0 0 8px rgba(99, 102, 241, 0.9);
        }

        nav .nav-btn {
            background: linear-gradient(135deg, var(--accent2), var(--accent3));
            border: none;
            padding: 8px 16px;
            border-radius: 999px;
            font-size: 13px;
            cursor: pointer;
            color: #020617;
            font-weight: 600;
            box-shadow: 0 6px 20px rgba(129, 140, 248, 0.6);
            transition: 0.2s;
        }

        nav .nav-btn:hover {
            transform: translateY(-2px);
        }

        /* ---------------- MAIN CONTENT ---------------- */
        main {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 20px;
            position: relative;
            z-index: 5;
        }

        .hero {
            text-align: left;
            margin-bottom: 40px;
        }

        .hero-title {
            font-size: 44px;
            font-weight: 800;
            margin-bottom: 12px;
            line-height: 1.15;
        }

        .hero-title span {
            background: linear-gradient(90deg, var(--accent2), var(--accent3), var(--accent4));
            -webkit-background-clip: text;
            color: transparent;
        }

        .hero-sub {
            color: var(--text-muted);
            max-width: 550px;
            font-size: 15px;
            margin-bottom: 20px;
        }

        .btn-primary {
            padding: 12px 20px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            color: #020617;
            background: linear-gradient(135deg, var(--accent2), var(--accent3));
            box-shadow: 0 8px 24px rgba(99, 102, 241, 0.6);
        }

        /* ---------------- COMPARE BOX (FULL-WIDTH NOW) ---------------- */
        .compare-panel {
            margin-top: 50px;
            width: 100%;
            background: rgba(15, 23, 42, 0.92);
            border: 1px solid rgba(148, 163, 184, 0.4);
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .compare-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 14px;
        }

        .compare-header select {
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15, 23, 42, 0.9);
            border: 1px solid rgba(148, 163, 184, 0.6);
            color: white;
            font-size: 13px;
        }

        .code-inputs {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        textarea {
            width: 100%;
            min-height: 160px;
            border-radius: 16px;
            padding: 12px;
            background: rgba(2, 6, 23, 0.9);
            color: white;
            font-family: monospace;
            border: 1px solid rgba(148, 163, 184, 0.5);
        }

        .comparison-bars {
            margin-top: 20px;
            padding: 14px;
            border-radius: 12px;
            background: rgba(2, 6, 23, 0.85);
        }

        .comparison-row {
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .bar-track {
            flex: 1;
            height: 8px;
            background: rgba(30, 64, 175, 0.7);
            border-radius: 999px;
            overflow: hidden;
        }

        .bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, var(--accent1), var(--accent2), var(--accent3), var(--accent4));
            transition: width 0.4s ease-out;
        }

        /* GitHub search box unchanged */
        .github-section {
            margin-top: 40px;
            padding: 20px;
            border-radius: 20px;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(148, 163, 184, 0.4);
        }

        /* ===========================
       GLOBAL LOADING POPUP
   =========================== */

        .loader {
            position: fixed;
            inset: 0;
            backdrop-filter: blur(6px);
            background: rgba(2, 6, 23, 0.55);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity .25s ease-out;
        }

        .loader.show {
            opacity: 1;
            pointer-events: all;
        }

        .loader p {
            margin-top: 18px;
            color: var(--text-muted);
            font-size: 14px;
            letter-spacing: 1px;
        }

        .spinner {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            border: 6px solid rgba(99, 102, 241, 0.2);
            border-top-color: var(--accent2);
            border-right-color: var(--accent3);
            border-bottom-color: var(--accent4);
            animation: spin 1s linear infinite;
            box-shadow: 0 0 20px rgba(99, 102, 241, 0.4),
                0 0 40px rgba(236, 72, 153, 0.4),
                0 0 60px rgba(249, 115, 22, 0.4);
        }

        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>

    <div class="bg-layer" id="bgLayer"></div>
    <div class="bg-grid"></div>

    <nav>
        <div class="nav-inner">
            <div class="logo">x-clone</div>
            <ul>
                <li>Home</li>
                <li>Features</li>
                <li>GitHub</li>
            </ul>
            <button class="nav-btn">Login</button>
        </div>
    </nav>

    <main>
        <!-- ---------------- HERO ---------------- -->
        <section class="hero">
            <div class="hero-title">
                Detect <span>Code Clones</span> Instantly.
            </div>
            <p class="hero-sub">
                Compare two code snippets or scan GitHub to detect Type 1, Type 2 and Type 3 clones.
            </p>
            <button class="btn-primary" id="scrollToCompare">Start Comparison ↓</button>
        </section>

        <!-- ---------------- COMPARE PANEL (FULL WIDTH) ---------------- -->
        <section class="compare-panel" id="comparePanel">
            <div class="compare-header">
                <h2>Clone Comparison</h2>
                <select id="cloneTypeSelect">
                    <option value="any">Any clone type</option>
                    <option value="t1">Type 1</option>
                    <option value="t2">Type 2</option>
                    <option value="t3">Type 3</option>
                    <option value="all" selected>All</option>
                </select>
            </div>

            <div class="code-inputs">
                <textarea id="codeA" placeholder="// Code A"></textarea>
                <textarea id="codeB" placeholder="// Code B"></textarea>
            </div>

            <button class="btn-primary" style="margin-top:15px" id="runCompare">Compare</button>

            <div class="comparison-bars">
                <div class="comparison-row" id="rowT1">
                    <span>Type 1</span>
                    <div class="bar-track">
                        <div class="bar-fill" id="barT1"></div>
                    </div>
                    <span id="percentT1">0%</span>
                </div>
                <div class="comparison-row" id="rowT2">
                    <span>Type 2</span>
                    <div class="bar-track">
                        <div class="bar-fill" id="barT2"></div>
                    </div>
                    <span id="percentT2">0%</span>
                </div>
                <div class="comparison-row" id="rowT3">
                    <span>Type 3</span>
                    <div class="bar-track">
                        <div class="bar-fill" id="barT3"></div>
                    </div>
                    <span id="percentT3">0%</span>
                </div>

            </div>
        </section>

        <section class="github-section">
            <h2>Search Across GitHub</h2>
            <textarea id="githubCode" placeholder="// Paste code to search GitHub"></textarea>
            <button class="btn-primary" style="margin-top:10px" id="runGithubSearch">
                Search GitHub
            </button>
            <p id="githubStatus" style="margin-top:10px;color:var(--text-muted)">Status: Idle</p>
        </section>
        <div id="loader" class="loader hidden">
            <div class="spinner"></div>
            <p>Processing...</p>
        </div>
    </main>

    <script>

        const bg = document.getElementById("bgLayer");
        window.addEventListener("mousemove", e => {
            const x = (e.clientX / window.innerWidth - 0.5) * 20;
            const y = (e.clientY / window.innerHeight - 0.5) * 20;
            bg.style.transform = `translate(${x}px, ${y}px)`;
        });

        document.getElementById("scrollToCompare").onclick = () =>
            document.getElementById("comparePanel").scrollIntoView({ behavior: "smooth" });
    </script>

    <script src="/static/js/main.js"></script>
</body>

</html>

</script>
</body>

</html>
